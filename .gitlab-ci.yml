---
stages:
  - build
  - test
  - coverage
  - release
  - tag
  - deploy

include:
  - project: 'connylegal/mietright_deployments'
    ref: main
    file: '/.gitlab-ci/build-container.yaml'
  - project: 'connylegal/mietright_deployments'
    ref: main
    file: '/.gitlab-ci/deploy.yaml'
  - project: 'connylegal/mietright_deployments'
    ref: main
    file: '/.gitlab-ci/trivy.yaml'

cache:
  key: $CI_COMMIT_REF_SLUG
  paths:
    - /opt/gitlab/cache/image-cache

variables:
  IMAGE_REPO_NAME: conny/printer
  APP: printer

  ### Printer
  NODE_ENV: development
  PORT: 9000
  ALLOW_HTTP: 'true'


# BUILD IMAGE
build image:
  extends: .image-build
  stage: build

build-base-image:
  extends: .image-build-ci

# RUN TEST
unit test:
  image:
    name: $IMAGE_NAME:$IMAGE_CI_SHA_TAG
  needs:
    - build-base-image
  cache:
    key: $CI_COMMIT_REF_SLUG
  stage: test
  variables:
    GIT_STRATEGY: none
  script:
    - cd /usr/src/app
    - yarn test
  tags:
    - kubernetes

# ---------------------------------------------------------------------------
# TRIVY SCANNERS (Filesystem only, Parallel, Table Output)
# ---------------------------------------------------------------------------
# 1. Vulnerabilities Scanner
trivy-vuln:
  extends: .trivy-vuln
  variables:
    TRIVY_SEVERITY: 'HIGH,CRITICAL'
  allow_failure: true
# 2. Misconfiguration Scanner (IaC)
trivy-misconfig:
  extends: .trivy-misconfig
  variables:
    TRIVY_SEVERITY: 'HIGH,CRITICAL'
  allow_failure: true
# 3. License Scanner
trivy-license:
  extends: .trivy-license
  variables:
    TRIVY_SEVERITY: 'HIGH,CRITICAL'
  allow_failure: true

yarn audit:
  image:
    name: $IMAGE_NAME:$IMAGE_CI_SHA_TAG
  stage: test
  needs:
    - build image
  variables:
    GIT_STRATEGY: none
  script:
    - cd /usr/src/app
    - yarn install --frozen-lockfile
    - bin/yarn_audit
  allow_failure: true
  tags:
    - kubernetes

lint:
  image:
    name: $IMAGE_NAME:$IMAGE_CI_SHA_TAG
  stage: test
  needs:
    - build-base-image
  variables:
    GIT_STRATEGY: none
  script:
    - cd /usr/src/app
    - yarn install --frozen-lockfile
    - yarn fmt
    - yarn lint
  tags:
    - kubernetes

deploy-staging:
  needs:
    - build image
  extends: .deploy-staging

deploy-production:
  needs:
    - build image
  extends: .deploy-production

deploy-pr-staging:
  stage: test
  needs:
    - build image
  extends: .deploy-pr-staging
  tags:
    - kubernetes
